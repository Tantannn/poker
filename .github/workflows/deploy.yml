# Build and publish the PWA to GitHub Pages on every push to main.
# Serves at https://<user>.github.io/poker/ — HTTPS, so the service worker
# registers and the app is installable ("Add to Home Screen") on phones.
name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - run: npm test
      # BASE_PATH makes vite emit asset URLs under /poker/ (the project-page root)
      - run: npm run build
        env:
          BASE_PATH: /poker/
      - uses: actions/upload-pages-artifact@v3
        with:
          path: dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
